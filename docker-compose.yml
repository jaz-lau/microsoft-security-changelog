# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.nas.yml
#
# Purpose:
#   Docker Compose file for the Synology NAS. Runs only the MS Learn watcher
#   container. When a change is detected, the watcher sends an HTTP POST to
#   the trigger_server.py running on your Mac.
#
# Setup:
#   1. Copy this file and Dockerfile.watcher to your Synology NAS
#   2. Set MAC_AGENT_URL in a .env file (see below)
#   3. Run: docker compose -f docker-compose.nas.yml up -d
#
# .env file (create alongside this file on the NAS):
#   MAC_AGENT_URL=http://YOUR-MAC-IP:5001/trigger
#   AGENT_SECRET=your-secret-token-here
#
# Placement: repo root (deploy to NAS)
# ─────────────────────────────────────────────────────────────────────────────

services:
  watcher:
    build:
      context: .
      dockerfile: Dockerfile.watcher
    container_name: ms-learn-watcher
    volumes:
      # Persist hash file and logs across container restarts
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # URL of the trigger server running on your Mac
      - MAC_AGENT_URL=${MAC_AGENT_URL}
      # Shared secret — must match trigger_server.py on your Mac
      - AGENT_SECRET=${AGENT_SECRET}
    restart: unless-stopped   # auto-restarts on NAS reboot
